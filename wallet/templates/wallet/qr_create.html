{% extends "wallet/base.html" %}
{% block title %}Create QR Link — KWallet{% endblock %}
{% block content %}
<div class="page-sm">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.25rem">
    <h1 style="font-size:1.4rem;font-weight:800;color:var(--ink);letter-spacing:-.03em">Create QR Link</h1>
    <a href="{% url 'qr_payment_list' %}" class="back-btn">← Back</a>
  </div>

  {% if messages %}
  <div class="msgs">{% for m in messages %}<div class="msg msg-{{ m.tags }}">{{ m }}</div>{% endfor %}</div>
  {% endif %}

  <div class="card">
    <form method="post">
      {% csrf_token %}
      <div class="fg">
        <label class="fl">Amount (KES) <span class="field-hint">— leave blank for open amount</span></label>
        <input class="fi" type="number" name="amount" step="0.01" min="1" placeholder="Optional fixed amount">
      </div>
      <div class="fg">
        <label class="fl">Note / Description</label>
        <input class="fi" type="text" name="note" maxlength="120" placeholder="e.g. Invoice #4, Lunch split">
      </div>
      <div class="fg" style="display:flex;align-items:center;gap:.65rem;margin-bottom:.6rem">
        <input type="checkbox" name="single_use" id="singleUse" style="accent-color:var(--teal);width:16px;height:16px">
        <label for="singleUse" style="font-size:.82rem;color:var(--ink-2);cursor:pointer">Single-use (auto-expire after first payment)</label>
      </div>
      <div class="fg">
        <label class="fl">Expires At <span class="field-hint">— leave blank for permanent</span></label>
        <input class="fi" type="datetime-local" name="expires_at">
      </div>
      <button type="submit" class="btn btn-primary btn-block">Generate QR Code →</button>
    </form>
  </div>
</div>
{% endblock %}
