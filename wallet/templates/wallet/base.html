<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>{% block title %}KWallet{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    /* ── TOKENS ── */
    :root {
      --teal:        #1DA57A;
      --teal-dk:     #0F6E56;
      --teal-lt:     #5DCAA5;
      --teal-50:     #E6F7F1;
      --teal-100:    #B3E8D5;
      --red:         #E24B4A;
      --red-lt:      #FDEAEA;
      --airtel:      #E11D48;
      --airtel-lt:   #FFF1F2;
      --bank:        #1D4ED8;
      --bank-lt:     #EFF6FF;
      --amber:       #C07B1A;
      --amber-lt:    #FEF3C7;
      --blue:        #2563EB;
      --blue-lt:     #EFF6FF;
      --bg:          #F0F4F3;
      --surface:     #FFFFFF;
      --ink:         #0D1B12;
      --ink-2:       #3B4D43;
      --ink-3:       #6B7D73;
      --ink-4:       #9EADA6;
      --border:      #E2EAE6;
      --shadow-sm:   0 1px 3px rgba(0,0,0,.06);
      --shadow-md:   0 4px 16px rgba(0,0,0,.08);
      --r-sm:        8px;
      --r-md:        14px;
      --r-lg:        20px;
      --r-xl:        28px;
      --r-full:      999px;
    }

    /* ── RESET ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      line-height: 1.55;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }
    a { text-decoration: none; }
    .mono { font-family: 'JetBrains Mono', monospace; }

    /* ── LAYOUT SHELLS ── */
    .app-shell {
      max-width: 430px;
      margin: 0 auto;
      min-height: 100vh;
      background: var(--bg);
      position: relative;
      display: flex;
      flex-direction: column;
    }
    .app-scroll { flex: 1; overflow-y: auto; padding-bottom: 88px; }
    .page     { max-width: 1080px; margin: 0 auto; padding: 1.5rem 1rem 7rem; }
    .page-sm  { max-width: 520px;  margin: 0 auto; padding: 1.5rem 1rem 7rem; }
    .page-auth{ max-width: 420px;  margin: 0 auto; padding: 2rem 1.25rem 4rem; }

    /* ── KYC BANNER (Risk #15) ── */
    .kyc-banner {
      background: #FEF3C7;
      border-bottom: 1px solid #FDE68A;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .kyc-banner-icon { font-size: 1.1rem; flex-shrink: 0; }
    .kyc-banner-text { flex: 1; }
    .kyc-banner-text strong { display: block; font-size: .78rem; color: #78350F; }
    .kyc-banner-text span   { font-size: .7rem; color: #92400E; }
    .kyc-banner-btn {
      background: #D97706; color: #fff; border: none;
      border-radius: var(--r-sm); padding: 6px 12px;
      font-size: .72rem; font-weight: 700; cursor: pointer; white-space: nowrap;
      font-family: 'Inter', sans-serif; text-decoration: none;
    }

    /* ── STALE RATE BANNER (Risk #01) ── */
    .rate-stale-banner {
      background: #FEF2F2;
      border-bottom: 1px solid #FECACA;
      padding: 8px 16px;
      font-size: .72rem;
      color: #991B1B;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* ── AML LIMIT BAR (Risk #16) ── */
    .limit-bar-wrap { margin-bottom: 4px; }
    .limit-bar-label { display:flex; justify-content:space-between; font-size:.68rem; color:var(--ink-4); margin-bottom:4px; }
    .limit-bar-track { height:4px; background:var(--border); border-radius:2px; overflow:hidden; }
    .limit-bar-fill  { height:100%; border-radius:2px; transition:width .4s; }
    .lb-green  { background: var(--teal); }
    .lb-yellow { background: #D97706; }
    .lb-red    { background: var(--red); }

    /* ── METHOD TABS (withdraw) ── */
    .method-tabs-bar {
      display: flex; gap: 8px; padding: 12px 16px 4px; overflow-x: auto;
      scrollbar-width: none;
    }
    .method-tab {
      flex-shrink: 0; padding: 9px 16px; border-radius: var(--r-full);
      border: 1.5px solid var(--border); background: var(--surface);
      font-size: .78rem; font-weight: 600; color: var(--ink-3);
      cursor: pointer; font-family: 'Inter', sans-serif; transition: all .18s;
    }
    .method-tab.active-mpesa  { border-color: var(--teal);   background: var(--teal-50);  color: var(--teal-dk); }
    .method-tab.active-airtel { border-color: var(--airtel); background: var(--airtel-lt); color: var(--airtel); }
    .method-tab.active-bank   { border-color: var(--bank);   background: var(--bank-lt);   color: var(--bank); }

    /* ── METHOD PANES ── */
    .method-pane { display: none; }
    .method-pane.active { display: block; }

    /* ── INFO CHIP ── */
    .info-chip {
      display:flex; align-items:flex-start; gap:10px;
      background:var(--bg); border:1px solid var(--border);
      border-radius:var(--r-md); padding:12px 14px; margin-bottom:14px;
    }
    .info-chip-icon {
      width:36px; height:36px; border-radius:var(--r-sm);
      display:flex; align-items:center; justify-content:center;
      font-size:1.1rem; flex-shrink:0;
    }
    .info-chip-title { font-size:.82rem; font-weight:700; color:var(--ink); margin-bottom:2px; }
    .info-chip-sub   { font-size:.72rem; color:var(--ink-3); line-height:1.4; }

    /* ── FEE PREVIEW ── */
    .fee-preview {
      background:var(--bg); border:1px solid var(--border);
      border-radius:var(--r-sm); padding:10px 12px; margin-bottom:12px;
    }
    .fee-row   { display:flex; justify-content:space-between; padding:2px 0; }
    .fee-label { font-size:.72rem; color:var(--ink-3); }
    .fee-val   { font-size:.74rem; font-weight:600; color:var(--ink); font-family:'JetBrains Mono',monospace; }
    .fee-divider  { height:1px; background:var(--border); margin:5px 0; }
    .fee-total-label { font-size:.74rem; font-weight:700; color:var(--ink-2); }
    .fee-total-val   { font-size:.78rem; font-weight:800; color:var(--ink); font-family:'JetBrains Mono',monospace; }

    /* ── BANK CHIPS ── */
    .bank-chips { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:12px; }
    .bank-chip {
      padding:5px 12px; border-radius:var(--r-full);
      border:1.5px solid var(--border); font-size:.72rem;
      font-weight:600; color:var(--ink-3); cursor:pointer;
      background:var(--surface); transition:all .15s; font-family:'Inter',sans-serif;
    }
    .bank-chip.selected { border-color:var(--bank); background:var(--bank-lt); color:var(--bank); }

    /* ── SECURITY NOTICE ── */
    .security-notice {
      font-size:.68rem; color:var(--ink-4);
      display:flex; align-items:flex-start; gap:6px;
      margin-bottom:12px; line-height:1.4;
    }
    .security-notice svg { width:13px; height:13px; flex-shrink:0; stroke:var(--ink-4); fill:none; stroke-width:2; margin-top:1px; }

    /* ── KYC FULL BLOCK (withdraw page) ── */
    .kyc-full-block {
      background: #FEF3C7; border: 1px solid #FDE68A;
      border-radius: var(--r-lg); padding: 20px;
      display: flex; gap: 14px; align-items: flex-start;
    }
    .kyc-full-block-icon { font-size: 1.6rem; flex-shrink: 0; }
    .kyc-full-block strong { display: block; font-size: .9rem; color: #78350F; margin-bottom: 4px; }
    .kyc-full-block p  { font-size: .8rem; color: #92400E; line-height: 1.5; }
    .kyc-full-block a  { color: #78350F; font-weight: 700; }

    /* ── BACK BTN ── */
    .back-btn { font-size:.78rem; color:var(--teal); font-weight:600; padding: 4px 0; }

    /* ── BOTTOM NAV ── */
    .bottom-nav {
      position: fixed;
      bottom: 0; left: 50%;
      transform: translateX(-50%);
      width: 100%; max-width: 430px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 8px 0 calc(8px + env(safe-area-inset-bottom));
      display: flex;
      justify-content: space-around;
      align-items: flex-start;
      z-index: 200;
    }
    .nav-tab {
      display: flex; flex-direction: column;
      align-items: center; gap: 4px;
      cursor: pointer; min-width: 52px;
      padding: 2px 4px;
    }
    .nav-tab-icon {
      width: 28px; height: 28px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 50%;
      transition: background .2s;
      position: relative;
    }
    .nav-tab-icon svg { width: 22px; height: 22px; stroke: var(--ink-4); fill: none; stroke-width: 1.7; stroke-linecap: round; stroke-linejoin: round; transition: stroke .2s; }
    .nav-tab-label { font-size: 11px; color: var(--ink-4); font-weight: 500; transition: color .2s; line-height: 1; }
    .nav-tab.active .nav-tab-icon { background: var(--teal-50); }
    .nav-tab.active .nav-tab-icon svg { stroke: var(--teal); }
    .nav-tab.active .nav-tab-label { color: var(--teal); font-weight: 600; }
    .nav-tab.active .nav-tab-icon::after {
      content: '';
      position: absolute; bottom: -6px;
      left: 50%; transform: translateX(-50%);
      width: 5px; height: 5px;
      background: var(--teal); border-radius: 50%;
    }

    /* ── MOBILE HOME HEADER ── */
    .home-header {
      padding: 20px 20px 16px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }
    .hh-top { display:flex; justify-content:space-between; align-items:flex-start; width:100%; }
    .home-greeting   { font-size: 14px; color: var(--ink-3); margin-bottom: 2px; }
    .home-name       { font-size: 24px; font-weight: 800; color: var(--ink); letter-spacing: -.03em; }
    .dash-avatar {
      width:40px; height:40px; border-radius:50%;
      background:linear-gradient(135deg,var(--teal),var(--teal-dk));
      color:#fff; font-weight:800; font-size:.9rem;
      display:flex; align-items:center; justify-content:center;
      flex-shrink:0;
    }
    .currency-toggle {
      background: var(--ink); color: #fff; border: none;
      border-radius: var(--r-full); padding: 8px 18px;
      font-size: 13px; font-weight: 600; cursor: pointer;
      white-space: nowrap; font-family: 'Inter', sans-serif;
    }

    /* ── PORTFOLIO CARD ── */
    .portfolio-card {
      margin: 0 16px;
      background: linear-gradient(130deg, #2DC98A 0%, #0F7A5A 100%);
      border-radius: var(--r-xl);
      padding: 26px 24px 22px;
      color: #fff;
      position: relative;
      overflow: hidden;
    }
    .portfolio-card::before {
      content: '';
      position: absolute; top: -40px; right: -40px;
      width: 140px; height: 140px;
      background: rgba(255,255,255,.08); border-radius: 50%;
    }
    .portfolio-card::after {
      content: '';
      position: absolute; bottom: -20px; right: 60px;
      width: 80px; height: 80px;
      background: rgba(255,255,255,.05); border-radius: 50%;
    }
    .pc-label  { font-size: 13px; opacity: .75; margin-bottom: 4px; position: relative; z-index: 1; }
    .pc-value  { font-size: 34px; font-weight: 800; letter-spacing: -.02em; line-height: 1.1; position: relative; z-index: 1; }
    .pc-card-no{ font-size: 13px; opacity: .55; margin: 6px 0 14px; letter-spacing: 1.5px; position: relative; z-index: 1; }
    .pc-rate   {
      display: inline-flex; align-items: center; gap: 5px;
      background: rgba(255,255,255,.18); border-radius: var(--r-full);
      padding: 4px 12px; font-size: 12px;
      position: relative; z-index: 1;
    }
    .pc-rate-dot { width: 6px; height: 6px; background: #fff; border-radius: 50%; opacity: .8; }
    .pc-rate-dot.stale { background: #FCA5A5; }

    /* ── QUICK ACTIONS ── */
    .actions-row {
      display: flex; justify-content: space-around;
      padding: 20px 12px 8px;
    }
    .action-item {
      display: flex; flex-direction: column; align-items: center;
      gap: 7px; cursor: pointer; text-decoration: none;
      border: none; background: none; font-family: 'Inter', sans-serif;
    }
    .action-item.disabled { opacity: .4; cursor: not-allowed; }
    .action-circle {
      width: 52px; height: 52px;
      background: var(--teal-50); border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      transition: background .2s, transform .15s;
    }
    .action-circle:hover { background: var(--teal-100); transform: scale(1.06); }
    .action-circle svg { width: 22px; height: 22px; stroke: var(--teal-dk); fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
    /* Withdraw circle — rose */
    .ac-withdraw  { background: #FCE7F3 !important; }
    .ac-withdraw svg { stroke: #BE185D !important; }
    .ac-withdraw:hover { background: #FBCFE8 !important; }
    /* Airtel circle */
    .ac-airtel { background: var(--airtel-lt) !important; }
    .ac-airtel svg { stroke: var(--airtel) !important; }
    /* Bank circle */
    .ac-bank { background: var(--bank-lt) !important; }
    .ac-bank svg { stroke: var(--bank) !important; }
    .action-label { font-size: 12px; color: var(--ink-2); font-weight: 500; }

    /* ── SECTION HEADER ── */
    .section-hd {
      display: flex; justify-content: space-between; align-items: center;
      padding: 18px 20px 10px;
    }
    .section-title { font-size: 17px; font-weight: 700; color: var(--ink); }
    .section-link  { font-size: 13px; color: var(--teal); font-weight: 500; cursor: pointer; }

    /* ── TRANSACTION LIST ── */
    .tx-list { padding: 0 16px; display: flex; flex-direction: column; }
    .tx-row  {
      display: flex; align-items: center; gap: 12px;
      background: var(--surface); border-radius: var(--r-md);
      padding: 13px 14px; margin-bottom: 2px;
    }
    .tx-avatar {
      width: 42px; height: 42px; border-radius: 50%;
      background: var(--teal-50);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .tx-avatar.tx-av-credit   { background: var(--teal-50); }
    .tx-avatar.tx-av-debit    { background: var(--red-lt); }
    .tx-avatar.tx-av-exchange { background: var(--blue-lt); }
    .tx-avatar.tx-av-p2p      { background: #F3E8FF; }
    .tx-avatar.tx-av-airtel   { background: var(--airtel-lt); }
    .tx-avatar.tx-av-bank     { background: var(--bank-lt); }
    .tx-avatar svg { width: 20px; height: 20px; stroke: var(--teal-dk); fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
    .tx-body { flex: 1; min-width: 0; }
    .tx-name { font-size: 14px; font-weight: 600; color: var(--ink); margin-bottom: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .tx-date { font-size: 12px; color: var(--ink-4); }
    .tx-amt  { font-size: 15px; font-weight: 700; font-family: 'JetBrains Mono', monospace; white-space: nowrap; }
    .tx-credit { color: var(--teal); }
    .tx-debit  { color: var(--red); }

    /* ── BALANCE GRID ── */
    .bal-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px,1fr)); gap: .75rem; }
    .bal-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--r-md); padding: .9rem;
      position: relative; overflow: hidden;
      transition: box-shadow .2s, transform .2s;
    }
    .bal-card:hover { box-shadow: var(--shadow-md); transform: translateY(-2px); }
    .bal-card::after { content:''; position:absolute; bottom:0; left:0; right:0; height:3px; background:linear-gradient(90deg,var(--teal),var(--teal-lt)); border-radius:0 0 var(--r-md) var(--r-md); }
    .bal-flag { font-size: 1.35rem; margin-bottom: .3rem; }
    .bal-code { font-size: .62rem; font-weight: 700; letter-spacing: .09em; text-transform: uppercase; color: var(--ink-4); }
    .bal-val  { font-family: 'JetBrains Mono', monospace; font-size: 1rem; font-weight: 500; color: var(--ink); margin-top: .15rem; }
    .bal-usd  { font-family: 'JetBrains Mono', monospace; font-size: .6rem; color: var(--ink-4); margin-top: .12rem; }
    .bal-home { border-color: var(--teal-100); }
    .bal-home::before { content:'HOME'; position:absolute; top:.4rem; right:.5rem; font-size:.5rem; font-weight:700; letter-spacing:.08em; color:var(--teal-dk); background:var(--teal-50); padding:.1rem .3rem; border-radius:4px; }

    /* ── BUTTONS ── */
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: .4rem;
      padding: .65rem 1.5rem; border: none; border-radius: var(--r-full);
      font-family: 'Inter', sans-serif; font-size: .85rem; font-weight: 600;
      cursor: pointer; transition: all .18s; white-space: nowrap; text-decoration: none;
    }
    .btn-primary { background: linear-gradient(135deg, var(--teal), var(--teal-dk)); color: #fff; box-shadow: 0 2px 10px rgba(29,165,122,.28); }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 18px rgba(29,165,122,.38); }
    .btn-withdraw { background: linear-gradient(135deg,#BE185D,#9D174D); color:#fff; }
    .btn-withdraw:hover { transform:translateY(-1px); }
    .btn-airtel   { background: var(--airtel); color: #fff; }
    .btn-airtel:hover { transform:translateY(-1px); opacity:.92; }
    .btn-bank     { background: var(--bank); color: #fff; }
    .btn-bank:hover { transform:translateY(-1px); opacity:.92; }
    .btn-gold     { background: #D97706; color: #fff; }
    .btn-ghost { background: var(--surface); border: 1.5px solid var(--border); color: var(--ink-2); }
    .btn-ghost:hover { border-color: var(--teal-100); color: var(--teal-dk); }
    .btn-light { background: var(--teal-50); color: var(--teal-dk); font-weight: 600; }
    .btn-light:hover { background: var(--teal-100); }
    .btn-danger { background: var(--red-lt); color: #991b1b; border: 1.5px solid #fecaca; }
    .btn-sm  { padding: .38rem .9rem; font-size: .76rem; }
    .btn-block { width: 100%; border-radius: var(--r-md) !important; padding: .8rem !important; }

    /* ── FORMS ── */
    .fg { margin-bottom: 1rem; }
    .fl { display: block; font-size: .68rem; font-weight: 600; letter-spacing: .07em; text-transform: uppercase; color: var(--ink-3); margin-bottom: .35rem; }
    .field-hint { text-transform:none; letter-spacing:0; font-weight:400; color:var(--ink-4); }
    .fi, .fs {
      width: 100%; background: var(--bg);
      border: 1.5px solid var(--border); border-radius: var(--r-sm);
      color: var(--ink); font-family: 'Inter', sans-serif; font-size: .9rem;
      padding: .65rem 1rem; outline: none;
      transition: border-color .15s, box-shadow .15s;
    }
    .fi:focus, .fs:focus { border-color: var(--teal); box-shadow: 0 0 0 3px rgba(29,165,122,.12); background: var(--surface); }
    .fi-airtel:focus { border-color: var(--airtel) !important; box-shadow: 0 0 0 3px rgba(225,29,72,.12) !important; }
    .fi-bank:focus   { border-color: var(--bank) !important;   box-shadow: 0 0 0 3px rgba(29,78,216,.12) !important; }
    .fh { font-size: .68rem; color: var(--ink-4); margin-top: .25rem; }
    .fe { font-size: .7rem; color: var(--red); margin-top: .25rem; font-weight: 500; }
    .fg2 { display: grid; grid-template-columns: 1fr 1fr; gap: .85rem; }
    .errorlist { list-style: none; }
    .errorlist li { font-size: .7rem; color: var(--red); margin-top: .25rem; }

    /* ── CARDS ── */
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-lg); padding: 1.5rem; box-shadow: var(--shadow-sm); }
    .card-sm { padding: 1rem 1.25rem; }
    .card-title { font-size: .95rem; font-weight: 700; color: var(--ink); margin-bottom: .9rem; }

    /* ── BADGES ── */
    .badge { display: inline-flex; align-items: center; padding: .15rem .55rem; border-radius: 20px; font-size: .62rem; font-weight: 700; letter-spacing: .05em; text-transform: uppercase; }
    .bg-teal   { background: var(--teal-50);  color: var(--teal-dk); }
    .bg-green  { background: #DCFCE7;          color: #14532D; }
    .bg-red    { background: var(--red-lt);    color: #991b1b; }
    .bg-amber  { background: var(--amber-lt);  color: #78350f; }
    .bg-blue   { background: var(--blue-lt);   color: #1d4ed8; }
    .bg-gray   { background: var(--bg);        color: var(--ink-3); }

    /* ── MESSAGES ── */
    .msgs { display: flex; flex-direction: column; gap: .5rem; margin-bottom: 1.25rem; }
    .msg  { display: flex; align-items: flex-start; gap: .65rem; padding: .75rem 1rem; border-radius: var(--r-sm); font-size: .82rem; border: 1px solid; }
    .msg-success { background: var(--teal-50);  border-color: var(--teal-100);  color: var(--teal-dk); }
    .msg-error   { background: var(--red-lt);   border-color: #fecaca;          color: #991b1b; }
    .msg-warning { background: var(--amber-lt); border-color: #fde68a;          color: #78350f; }
    .msg-info    { background: var(--blue-lt);  border-color: #bfdbfe;          color: #1e40af; }

    /* ── AUTH PAGES ── */
    .auth-hero   { text-align: center; margin-bottom: 1.75rem; }
    .auth-logo   {
      width: 60px; height: 60px;
      background: linear-gradient(135deg, var(--teal), var(--teal-dk));
      border-radius: 16px; display: flex; align-items: center; justify-content: center;
      font-size: 1.7rem; margin: 0 auto 1rem;
      box-shadow: 0 4px 18px rgba(29,165,122,.28);
    }
    .auth-h1  { font-size: 1.75rem; font-weight: 800; color: var(--ink); letter-spacing: -.04em; }
    .auth-sub { color: var(--ink-3); margin-top: .25rem; font-size: .86rem; }
    .auth-foot{ text-align: center; margin-top: 1.1rem; font-size: .8rem; color: var(--ink-3); }
    .auth-foot a { color: var(--teal-dk); font-weight: 600; }
    .auth-foot a:hover { text-decoration: underline; }

    /* ── INFO BOXES ── */
    .ibox     { background: var(--bg); border: 1px solid var(--border); border-radius: var(--r-sm); padding: .8rem 1rem; font-size: .8rem; color: var(--ink-3); margin-bottom: 1rem; }
    .ibox strong { color: var(--ink); }
    .fee-box  { background: var(--amber-lt); border: 1px solid #fde68a; border-radius: var(--r-sm); padding: .8rem 1rem; font-size: .8rem; color: #78350f; margin-bottom: 1rem; }

    /* ── LIVE PREVIEW ── */
    .prev { background: var(--teal-50); border: 1px solid var(--teal-100); border-radius: var(--r-sm); padding: .8rem 1rem; margin-bottom: 1rem; display: none; }
    .prev-main { font-family: 'JetBrains Mono', monospace; font-size: .88rem; font-weight: 500; color: var(--teal-dk); }
    .prev-rate { font-family: 'JetBrains Mono', monospace; font-size: .66rem; color: var(--ink-4); margin-top: .15rem; }
    .prev-fee  { font-family: 'JetBrains Mono', monospace; font-size: .66rem; color: var(--amber); margin-top: .1rem; }

    /* ── TABLES ── */
    .tbl-wrap { border-radius: var(--r-md); border: 1px solid var(--border); overflow: hidden; }
    .tbl { width: 100%; border-collapse: collapse; background: var(--surface); }
    .tbl th { text-align: left; font-size: .62rem; font-weight: 700; letter-spacing: .09em; text-transform: uppercase; color: var(--ink-4); padding: .65rem 1rem; background: var(--bg); border-bottom: 1px solid var(--border); }
    .tbl td { padding: .75rem 1rem; font-size: .82rem; border-bottom: 1px solid var(--border); vertical-align: middle; }
    .tbl tr:last-child td { border-bottom: none; }
    .tbl tr:hover td { background: var(--teal-50); }

    /* ── RATES GRID ── */
    .rg { display: grid; grid-template-columns: repeat(2,1fr); gap: .2rem; }
    .rr { display: flex; justify-content: space-between; font-family: 'JetBrains Mono', monospace; font-size: .7rem; padding: .28rem 0; border-bottom: 1px solid var(--border); }
    .rr:last-child { border-bottom: none; }
    .rr-pair { color: var(--ink-3); }
    .rr-val  { color: var(--ink); font-weight: 500; }

    /* ── PULSE ── */
    .pulse-wrap { width: 56px; height: 56px; background: var(--teal-50); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.25rem; position: relative; }
    .pulse-wrap::before { content:''; position:absolute; inset:-7px; border-radius:50%; border:2px solid var(--teal); animation:ring 1.5s ease-out infinite; }
    .pulse-dot { width: 20px; height: 20px; background: var(--teal); border-radius: 50%; }
    @keyframes ring { 0%{opacity:1;transform:scale(1)} 100%{opacity:0;transform:scale(1.75)} }

    /* ── KYC BADGE ── */
    .kyc   { display:inline-flex; align-items:center; gap:.28rem; padding:.12rem .5rem; border-radius:20px; font-size:.6rem; font-weight:700; letter-spacing:.06em; text-transform:uppercase; }
    .kyc-v { background:var(--teal-50); color:var(--teal-dk); }
    .kyc-p { background:var(--amber-lt); color:#78350f; }
    .kyc-r { background:var(--red-lt); color:#991b1b; }

    /* ── FILTER BAR ── */
    .filter-bar { display:flex; gap:.6rem; flex-wrap:wrap; align-items:center; margin-bottom:1rem; }
    .fsel { background:var(--surface); border:1.5px solid var(--border); border-radius:var(--r-full); padding:.38rem .85rem; font-family:'Inter',sans-serif; font-size:.78rem; font-weight:500; color:var(--ink); cursor:pointer; outline:none; }
    .fsel:focus { border-color:var(--teal); }

    /* ── EMPTY ── */
    .empty { padding:3rem 2rem; text-align:center; color:var(--ink-4); }
    .empty-icon { font-size:2.5rem; margin-bottom:.75rem; }

    /* ── DIVIDER ── */
    hr.div { border:none; border-top:1px solid var(--border); margin:1.25rem 0; }

    /* ── MOCK BANNER ── */
    .mock-banner { background:var(--amber-lt); border:1px solid #fde68a; border-radius:var(--r-sm); padding:.9rem 1.1rem; margin-bottom:1.25rem; font-size:.8rem; color:#78350f; }

    /* ── CURRENCY PICKER ── */
    .curr-picker { display:grid; grid-template-columns:repeat(2,1fr); gap:.6rem; }
    .curr-section { background:var(--teal-50); border:1px solid var(--teal-100); border-radius:var(--r-md); padding:1rem; margin-bottom:1rem; }
    .curr-section-title { font-size:.65rem; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--teal-dk); margin-bottom:.6rem; }

    /* ── SEC ROW ── */
    .sec-row   { display: flex; align-items: center; justify-content: space-between; margin-bottom: .75rem; }
    .sec-label { font-size: .65rem; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--ink-4); }

    /* ── DESKTOP TOPNAV ── */
    @media(min-width:431px){
      .topnav-desktop { display: flex !important; }
      .bottom-nav     { max-width: 100vw; }
    }
    .topnav-desktop { display: none; background: var(--surface); border-bottom: 1px solid var(--border); height: 52px; align-items: center; justify-content: space-between; padding: 0 1.25rem; position: sticky; top: 0; z-index: 300; box-shadow: var(--shadow-sm); }
    .topnav-brand { display: flex; align-items: center; gap: .5rem; }
    .topnav-logo  {
      width: 30px; height: 30px;
      background: linear-gradient(135deg, var(--teal), var(--teal-dk));
      border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
      font-size: .85rem; color: #fff; font-weight: 800;
    }
    .topnav-name { font-size: 1.05rem; font-weight: 800; color: var(--ink); letter-spacing: -.03em; }
    .topnav-name span { color: var(--teal); }
    .topnav-links { display: flex; align-items: center; gap: .15rem; flex-wrap: wrap; }
    .topnav-a {
      color: var(--ink-3); font-size: .78rem; font-weight: 500;
      padding: .3rem .7rem; border-radius: var(--r-sm);
      transition: all .15s; white-space: nowrap;
    }
    .topnav-a:hover      { background: var(--teal-50); color: var(--teal-dk); }
    .topnav-a.nav-cta    { background: var(--teal-50); color: var(--teal-dk); font-weight: 600; }
    .topnav-a.nav-cta:hover { background: var(--teal-100); }
    .topnav-a.nav-out    { color: var(--red); }
    .topnav-a.nav-out:hover { background: var(--red-lt); }
    .topnav-a.nav-withdraw { background: #FCE7F3; color: #BE185D; font-weight: 600; }
    .topnav-a.nav-withdraw:hover { background: #FBCFE8; }
  </style>
  {% block extra_head %}{% endblock %}
</head>
<body>

{% if user.is_authenticated %}

{# ── Desktop topnav ── #}
<nav class="topnav-desktop">
  <div class="topnav-brand">
    <div class="topnav-logo">K</div>
    <span class="topnav-name">K<span>Wallet</span></span>
  </div>
  <div class="topnav-links">
    <a href="{% url 'dashboard' %}"       class="topnav-a">Dashboard</a>
    <a href="{% url 'mpesa_deposit' %}"   class="topnav-a nav-cta">⬆ Deposit</a>
    <a href="{% url 'withdraw' %}"        class="topnav-a nav-withdraw">⬇ Withdraw</a>
    <a href="{% url 'exchange' %}"        class="topnav-a">Exchange</a>
    <a href="{% url 'p2p' %}"             class="topnav-a">Transfer</a>
    <a href="{% url 'add_currency' %}"    class="topnav-a">+ Currency</a>
    <a href="{% url 'transactions' %}"    class="topnav-a">History</a>
    <a href="{% url 'qr_payment_list' %}" class="topnav-a">QR Pay</a>
    <a href="{% url 'logout' %}"          class="topnav-a nav-out">Logout</a>
  </div>
</nav>

{# ── Bottom nav ── #}
<nav class="bottom-nav" id="bottomNav">
  <a href="{% url 'dashboard' %}" class="nav-tab {% block nav_home %}{% endblock %}">
    <div class="nav-tab-icon">
      <svg viewBox="0 0 24 24"><path d="M3 12L12 3l9 9"/><path d="M9 21V12h6v9"/><path d="M3 12v9h18v-9"/></svg>
    </div>
    <span class="nav-tab-label">Home</span>
  </a>
  <a href="{% url 'transactions' %}" class="nav-tab {% block nav_history %}{% endblock %}">
    <div class="nav-tab-icon">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 15 15"/></svg>
    </div>
    <span class="nav-tab-label">History</span>
  </a>
  <a href="{% url 'exchange' %}" class="nav-tab {% block nav_exchange %}{% endblock %}">
    <div class="nav-tab-icon">
      <svg viewBox="0 0 24 24"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
    </div>
    <span class="nav-tab-label">Exchange</span>
  </a>
  <a href="{% url 'add_currency' %}" class="nav-tab {% block nav_currency %}{% endblock %}">
    <div class="nav-tab-icon">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
    </div>
    <span class="nav-tab-label">Currency</span>
  </a>
  <a href="{% url 'qr_payment_list' %}" class="nav-tab {% block nav_profile %}{% endblock %}">
    <div class="nav-tab-icon">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="3" height="3" rx=".5"/><rect x="18" y="14" width="3" height="3" rx=".5"/><rect x="14" y="18" width="3" height="3" rx=".5"/><rect x="18" y="18" width="3" height="3" rx=".5"/></svg>
    </div>
    <span class="nav-tab-label">QR Pay</span>
  </a>
</nav>

{% endif %}

<main>{% block content %}{% endblock %}</main>
</body>
</html>
