<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}KWallet{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --teal:#1D9E75; --teal-dk:#0F6E56; --teal-xdk:#085041;
      --teal-lt:#5DCAA5; --teal-50:#E1F5EE; --teal-100:#9FE1CB;
      --red:#E24B4A; --red-lt:#FEE2E2;
      --amber:#BA7517; --amber-lt:#FEF3C7;
      --blue:#185FA5; --blue-lt:#E6F1FB;
      --bg:#F0F4F3; --white:#FFFFFF;
      --ink:#111827; --ink70:#374151; --ink50:#6B7280; --ink30:#9CA3AF; --ink10:#F3F4F6; --ink-border:#E5E7EB;
      --shadow-sm:0 1px 4px rgba(0,0,0,.06);
      --shadow-md:0 4px 20px rgba(0,0,0,.09);
      --r8:8px; --r12:12px; --r16:16px; --r20:20px; --r24:24px; --r100:100px;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg);color:var(--ink);font-family:'Inter',sans-serif;min-height:100vh;line-height:1.6;-webkit-font-smoothing:antialiased}
    .mono{font-family:'JetBrains Mono',monospace}

    /* ── TOP NAV (desktop/authenticated) ── */
    .topnav{background:var(--white);border-bottom:1px solid var(--ink-border);height:58px;display:flex;align-items:center;justify-content:space-between;padding:0 1.5rem;position:sticky;top:0;z-index:200;box-shadow:var(--shadow-sm)}
    .topnav-brand{display:flex;align-items:center;gap:.5rem;text-decoration:none}
    .topnav-icon{width:32px;height:32px;background:linear-gradient(135deg,var(--teal),var(--teal-dk));border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:.9rem}
    .topnav-name{font-size:1.1rem;font-weight:800;color:var(--ink);letter-spacing:-.04em}
    .topnav-name span{color:var(--teal)}
    .topnav-links{display:flex;align-items:center;gap:.1rem;flex-wrap:wrap}
    .topnav-a{color:var(--ink50);text-decoration:none;font-size:.8rem;font-weight:500;padding:.3rem .75rem;border-radius:var(--r8);transition:all .15s;white-space:nowrap}
    .topnav-a:hover{background:var(--ink10);color:var(--ink)}
    .topnav-a.active{color:var(--teal);background:var(--teal-50)}
    .topnav-a.nav-deposit{background:var(--teal-50);color:var(--teal-dk);font-weight:600}
    .topnav-a.nav-deposit:hover{background:var(--teal-100)}
    .topnav-a.nav-out{color:var(--red)}
    .topnav-a.nav-out:hover{background:var(--red-lt)}

    /* ── LAYOUT ── */
    .page{max-width:1100px;margin:0 auto;padding:2rem 1.5rem}
    .page-sm{max-width:540px;margin:0 auto;padding:2rem 1.5rem}
    .page-auth{max-width:440px;margin:2rem auto;padding:0 1.5rem}

    /* ── CARDS ── */
    .card{background:var(--white);border:1px solid var(--ink-border);border-radius:var(--r16);padding:1.5rem;box-shadow:var(--shadow-sm)}
    .card-sm{padding:1.1rem 1.25rem}
    .card-title{font-size:1rem;font-weight:700;color:var(--ink);margin-bottom:1rem;letter-spacing:-.02em}

    /* ── SECTION LABELS ── */
    .sec-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem}
    .sec-label{font-size:.68rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--ink30)}

    /* ── FORMS ── */
    .fg{margin-bottom:1rem}
    .fl{display:block;font-size:.72rem;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--ink50);margin-bottom:.35rem}
    .fi,.fs{width:100%;background:var(--ink10);border:1.5px solid var(--ink-border);border-radius:var(--r8);color:var(--ink);font-family:'Inter',sans-serif;font-size:.9rem;padding:.62rem .95rem;outline:none;transition:border-color .15s,box-shadow .15s}
    .fi:focus,.fs:focus{border-color:var(--teal);box-shadow:0 0 0 3px rgba(29,158,117,.12);background:var(--white)}
    .fh{font-size:.7rem;color:var(--ink30);margin-top:.25rem}
    .fg2{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
    .fg3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.75rem}
    .fe{font-size:.72rem;color:var(--red);margin-top:.25rem;font-weight:500}
    .errorlist{list-style:none}.errorlist li{font-size:.72rem;color:var(--red);margin-top:.25rem}

    /* ── BUTTONS ── */
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:.4rem;padding:.62rem 1.5rem;border:none;border-radius:var(--r8);font-family:'Inter',sans-serif;font-size:.84rem;font-weight:600;cursor:pointer;text-decoration:none;transition:all .18s;white-space:nowrap}
    .btn-primary{background:linear-gradient(135deg,var(--teal),var(--teal-dk));color:#fff;box-shadow:0 2px 10px rgba(29,158,117,.28)}
    .btn-primary:hover{transform:translateY(-1px);box-shadow:0 4px 18px rgba(29,158,117,.38)}
    .btn-white{background:var(--white);border:1.5px solid var(--ink-border);color:var(--ink)}
    .btn-white:hover{border-color:var(--ink30)}
    .btn-danger{background:var(--red-lt);border:1.5px solid #fecaca;color:#991b1b}
    .btn-block{width:100%}
    .btn-sm{padding:.35rem .85rem;font-size:.76rem}

    /* ── BALANCE GRID ── */
    .bal-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:.75rem}
    .bal-card{background:var(--white);border:1px solid var(--ink-border);border-radius:var(--r12);padding:1rem;position:relative;overflow:hidden;transition:box-shadow .2s,transform .2s}
    .bal-card:hover{box-shadow:var(--shadow-md);transform:translateY(-2px)}
    .bal-card::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--teal),var(--teal-lt));border-radius:0 0 var(--r12) var(--r12)}
    .bal-flag{font-size:1.4rem;margin-bottom:.35rem}
    .bal-code{font-size:.65rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--ink30)}
    .bal-val{font-family:'JetBrains Mono',monospace;font-size:1.05rem;font-weight:500;color:var(--ink);margin-top:.15rem;line-height:1.2}
    .bal-usd{font-family:'JetBrains Mono',monospace;font-size:.62rem;color:var(--ink30);margin-top:.15rem}
    .bal-home{border-color:var(--teal-100)}
    .bal-home::before{content:'HOME';position:absolute;top:.45rem;right:.55rem;font-size:.52rem;font-weight:700;letter-spacing:.08em;color:var(--teal-dk);background:var(--teal-50);padding:.1rem .3rem;border-radius:4px}

    /* ── ACTION GRID ── */
    .act-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:.85rem}
    @media(max-width:700px){.act-grid{grid-template-columns:repeat(2,1fr)}}
    .act-btn{display:flex;flex-direction:column;align-items:center;gap:.5rem;padding:1.1rem .75rem;background:var(--white);border:1px solid var(--ink-border);border-radius:var(--r12);text-decoration:none;color:var(--ink);font-size:.76rem;font-weight:600;text-align:center;transition:all .2s;box-shadow:var(--shadow-sm)}
    .act-btn:hover{transform:translateY(-3px);box-shadow:var(--shadow-md)}
    .act-icon{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.1rem}
    .act-mpesa .act-icon{background:var(--teal-50)}
    .act-exc .act-icon{background:var(--blue-lt)}
    .act-p2p .act-icon{background:var(--amber-lt)}
    .act-qr .act-icon{background:var(--teal-50)}

    /* ── PORTFOLIO BANNER ── */
    .pb{background:linear-gradient(135deg,var(--teal) 0%,var(--teal-dk) 100%);border-radius:var(--r24);padding:1.75rem 2rem;color:#fff;display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:2rem;position:relative;overflow:hidden}
    .pb::before{content:'';position:absolute;top:-50px;right:-50px;width:180px;height:180px;background:rgba(255,255,255,.08);border-radius:50%}
    .pb::after{content:'';position:absolute;bottom:-30px;right:80px;width:100px;height:100px;background:rgba(255,255,255,.05);border-radius:50%}
    .pb-l{position:relative;z-index:1}
    .pb-greet{font-size:.75rem;font-weight:500;opacity:.65;margin-bottom:.2rem;letter-spacing:.03em}
    .pb-name{font-size:1.3rem;font-weight:800;letter-spacing:-.03em}
    .pb-phone{font-family:'JetBrains Mono',monospace;font-size:.72rem;opacity:.5;margin-top:.08rem}
    .pb-r{text-align:right;position:relative;z-index:1}
    .pb-lbl{font-size:.65rem;font-weight:600;opacity:.5;letter-spacing:.08em;text-transform:uppercase;margin-bottom:.15rem}
    .pb-val{font-family:'JetBrains Mono',monospace;font-size:1.9rem;font-weight:500;color:#fff;line-height:1}
    .pb-sub{font-size:.66rem;opacity:.45;margin-top:.12rem}
    @media(max-width:600px){.pb{flex-direction:column;align-items:flex-start;gap:1rem}.pb-r{text-align:left}}

    /* ── TABLES ── */
    .tbl-wrap{border-radius:var(--r12);border:1px solid var(--ink-border);overflow:hidden}
    .tbl{width:100%;border-collapse:collapse;background:var(--white)}
    .tbl th{text-align:left;font-size:.64rem;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--ink30);padding:.65rem 1rem;background:var(--ink10);border-bottom:1px solid var(--ink-border)}
    .tbl td{padding:.75rem 1rem;font-size:.82rem;border-bottom:1px solid var(--ink-border);vertical-align:middle}
    .tbl tr:last-child td{border-bottom:none}
    .tbl tr:hover td{background:var(--ink10)}

    /* ── TRANSACTION ROWS ── */
    .tx-list{display:flex;flex-direction:column;gap:2px}
    .tx-item{display:flex;align-items:center;gap:12px;background:var(--white);border-radius:var(--r12);padding:13px 16px}
    .tx-avatar{width:40px;height:40px;border-radius:50%;background:var(--teal-50);display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0}
    .tx-info{flex:1}
    .tx-name{font-size:.85rem;font-weight:600;color:var(--ink);margin-bottom:1px}
    .tx-date{font-size:.72rem;color:var(--ink30)}
    .tx-amount{font-size:.9rem;font-weight:700;font-family:'JetBrains Mono',monospace}
    .tx-debit{color:var(--red)}
    .tx-credit{color:var(--teal)}

    /* ── BADGES ── */
    .badge{display:inline-flex;align-items:center;gap:.25rem;padding:.15rem .55rem;border-radius:20px;font-size:.64rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase}
    .bg-teal{background:var(--teal-50);color:var(--teal-dk)}
    .bg-green{background:#DCFCE7;color:#14532D}
    .bg-red{background:var(--red-lt);color:#991b1b}
    .bg-amber{background:var(--amber-lt);color:#78350f}
    .bg-blue{background:var(--blue-lt);color:#1d4ed8}
    .bg-gray{background:var(--ink10);color:var(--ink50)}
    .bg-teal-border{background:var(--teal-50);color:var(--teal-dk);border:1px solid var(--teal-100)}

    /* ── MESSAGES ── */
    .msgs{display:flex;flex-direction:column;gap:.5rem;margin-bottom:1.5rem}
    .msg{display:flex;align-items:flex-start;gap:.65rem;padding:.8rem 1rem;border-radius:var(--r8);font-size:.83rem;border:1px solid}
    .msg-success{background:var(--teal-50);border-color:var(--teal-100);color:var(--teal-xdk)}
    .msg-error{background:var(--red-lt);border-color:#fecaca;color:#991b1b}
    .msg-warning{background:var(--amber-lt);border-color:#fde68a;color:#78350f}
    .msg-info{background:var(--blue-lt);border-color:#bfdbfe;color:#1e40af}

    /* ── AUTH ── */
    .auth-hero{text-align:center;margin-bottom:1.75rem}
    .auth-logo{width:60px;height:60px;background:linear-gradient(135deg,var(--teal),var(--teal-dk));border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:1.7rem;margin:0 auto 1rem;box-shadow:0 4px 18px rgba(29,158,117,.28)}
    .auth-h1{font-size:1.75rem;font-weight:800;color:var(--ink);letter-spacing:-.04em}
    .auth-sub{color:var(--ink50);margin-top:.25rem;font-size:.86rem}
    .auth-foot{text-align:center;margin-top:1rem;font-size:.8rem;color:var(--ink50)}
    .auth-foot a{color:var(--teal-dk);font-weight:600;text-decoration:none}
    .auth-foot a:hover{text-decoration:underline}

    /* ── PAGE HEADER ── */
    .ph{margin-bottom:1.75rem}
    .ph h1{font-size:1.75rem;font-weight:800;color:var(--ink);letter-spacing:-.04em;line-height:1.15}
    .ph p{color:var(--ink50);margin-top:.25rem;font-size:.88rem}

    /* ── INFO / FEE BOX ── */
    .ibox{background:var(--ink10);border:1px solid var(--ink-border);border-radius:var(--r8);padding:.8rem 1rem;font-size:.81rem;color:var(--ink50);margin-bottom:1rem}
    .ibox strong{color:var(--ink)}
    .fee-box{background:var(--amber-lt);border:1px solid #fde68a;border-radius:var(--r8);padding:.8rem 1rem;font-size:.81rem;color:#78350f;margin-bottom:1rem}

    /* ── LIVE PREVIEW ── */
    .prev{background:var(--teal-50);border:1px solid var(--teal-100);border-radius:var(--r8);padding:.8rem 1rem;margin-bottom:1rem;display:none}
    .prev-main{font-family:'JetBrains Mono',monospace;font-size:.9rem;font-weight:500;color:var(--teal-dk)}
    .prev-rate{font-family:'JetBrains Mono',monospace;font-size:.68rem;color:var(--ink30);margin-top:.18rem}
    .prev-fee{font-family:'JetBrains Mono',monospace;font-size:.68rem;color:var(--amber);margin-top:.12rem}

    /* ── RATES GRID ── */
    .rg{display:grid;grid-template-columns:repeat(2,1fr);gap:.25rem}
    .rr{display:flex;justify-content:space-between;font-family:'JetBrains Mono',monospace;font-size:.72rem;padding:.28rem 0;border-bottom:1px solid var(--ink10)}
    .rr:last-child{border-bottom:none}
    .rr-pair{color:var(--ink50)}
    .rr-val{color:var(--ink);font-weight:500}

    /* ── PULSE / PENDING ── */
    .pulse-wrap{width:56px;height:56px;background:var(--teal-50);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 1.25rem;position:relative}
    .pulse-wrap::before{content:'';position:absolute;inset:-7px;border-radius:50%;border:2px solid var(--teal);animation:ring 1.5s ease-out infinite}
    .pulse-dot{width:20px;height:20px;background:var(--teal);border-radius:50%}
    @keyframes ring{0%{opacity:1;transform:scale(1)}100%{opacity:0;transform:scale(1.75)}}

    /* ── KYC PILL ── */
    .kyc{display:inline-flex;align-items:center;gap:.3rem;padding:.15rem .55rem;border-radius:20px;font-size:.63rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase}
    .kyc-v{background:var(--teal-50);color:var(--teal-dk)}
    .kyc-p{background:var(--amber-lt);color:#78350f}
    .kyc-r{background:var(--red-lt);color:#991b1b}

    /* ── FILTER BAR ── */
    .filter-bar{display:flex;gap:.6rem;flex-wrap:wrap;align-items:center;margin-bottom:1rem}
    .fsel{background:var(--white);border:1.5px solid var(--ink-border);border-radius:var(--r8);padding:.4rem .8rem;font-family:'Inter',sans-serif;font-size:.78rem;font-weight:500;color:var(--ink);cursor:pointer;outline:none}
    .fsel:focus{border-color:var(--teal)}

    /* ── EMPTY STATE ── */
    .empty{padding:3rem 2rem;text-align:center;color:var(--ink30)}
    .empty-icon{font-size:2.5rem;margin-bottom:.75rem}

    /* ── DIVIDER ── */
    hr.div{border:none;border-top:1px solid var(--ink-border);margin:1.25rem 0}

    /* ── CURRENCY PICKER ── */
    .curr-picker{display:grid;grid-template-columns:repeat(2,1fr);gap:.6rem}
    .curr-section{background:var(--teal-50);border:1px solid var(--teal-100);border-radius:var(--r12);padding:1rem;margin-bottom:1rem}
    .curr-section-title{font-size:.68rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--teal-dk);margin-bottom:.6rem}
    .country-badge{display:inline-flex;align-items:center;gap:.35rem;padding:.2rem .65rem;border-radius:20px;font-size:.68rem;font-weight:600;background:var(--ink10);color:var(--ink50)}
    .country-badge-teal{background:var(--teal-50);color:var(--teal-dk)}

    /* ── MOCK BANNER ── */
    .mock-banner{background:var(--amber-lt);border:1px solid #fde68a;border-radius:var(--r8);padding:.9rem 1.1rem;margin-bottom:1.25rem;font-size:.81rem;color:#78350f}
  </style>
  {% block extra_head %}{% endblock %}
</head>
<body>
{% if user.is_authenticated %}
<nav class="topnav">
  <a href="{% url 'dashboard' %}" class="topnav-brand">
    <div class="topnav-icon">💳</div>
    <span class="topnav-name">K<span>Wallet</span></span>
  </a>
  <div class="topnav-links">
    <a href="{% url 'dashboard' %}"       class="topnav-a">Dashboard</a>
    <a href="{% url 'mpesa_deposit' %}"   class="topnav-a nav-deposit">⬆ Deposit</a>
    <a href="{% url 'mpesa_withdraw' %}"  class="topnav-a nav-deposit">⬇ Withdraw</a>
    <a href="{% url 'exchange' %}"        class="topnav-a">Exchange</a>
    <a href="{% url 'p2p' %}"             class="topnav-a">Transfer</a>
    <a href="{% url 'add_currency' %}"    class="topnav-a">+ Currency</a>
    <a href="{% url 'transactions' %}"    class="topnav-a">History</a>
    <a href="{% url 'qr_payment_list' %}" class="topnav-a">QR Pay</a>
    <a href="{% url 'logout' %}"          class="topnav-a nav-out">Logout</a>
  </div>
</nav>
{% endif %}
<main>{% block content %}{% endblock %}</main>
</body>
</html>
