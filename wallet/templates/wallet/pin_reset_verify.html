{% extends "wallet/base.html" %}
{% block title %}Verify Code — KWallet{% endblock %}
{% block content %}
<div class="page-auth">
  <div class="auth-hero">
    <div class="auth-logo"><svg viewBox="0 0 24 24"><rect x="5" y="2" width="14" height="20" rx="2"/><line x1="11" y1="18" x2="13" y2="18"/></svg></div>
    <h1 class="auth-h1">Enter code</h1>
    <p class="auth-sub">Sent to {{ phone }}</p>
  </div>
  {% if messages %}
  <div class="msgs">{% for m in messages %}<div class="msg msg-{{ m.tags }}">{{ m }}</div>{% endfor %}</div>
  {% endif %}
  <div class="card">
    <form method="post">
      {% csrf_token %}
      <input type="hidden" name="phone" value="{{ phone }}">
      <div class="fg">
        <label class="fl">Verification Code</label>
        <input class="fi" type="text" name="code" maxlength="6" placeholder="6-digit code" required autofocus
               style="letter-spacing:.25em;font-size:1.2rem;text-align:center;font-family:'JetBrains Mono',monospace">
      </div>
      {% if error %}<div class="fe" style="margin-bottom:.75rem">{{ error }}</div>{% endif %}
      <button type="submit" class="btn btn-primary btn-block">Verify →</button>
    </form>
  </div>
  <div class="auth-foot"><a href="{% url 'pin_reset_request' %}">← Resend code</a></div>
</div>
{% endblock %}
