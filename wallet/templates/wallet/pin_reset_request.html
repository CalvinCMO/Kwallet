{% extends "wallet/base.html" %}
{% block title %}Reset PIN — KWallet{% endblock %}
{% block content %}
<div class="page-auth">
  <div class="auth-hero">
    <div class="auth-logo">🔑</div>
    <h1 class="auth-h1">Reset your PIN</h1>
    <p class="auth-sub">We'll send a verification code to your phone</p>
  </div>
  {% if messages %}
  <div class="msgs">{% for m in messages %}<div class="msg msg-{{ m.tags }}">{{ m }}</div>{% endfor %}</div>
  {% endif %}
  <div class="card">
    <form method="post">
      {% csrf_token %}
      <div class="fg">
        <label class="fl">Registered Phone Number</label>
        <input class="fi" type="tel" name="phone" placeholder="07XX XXX XXX" required autofocus>
      </div>
      <button type="submit" class="btn btn-primary btn-block">Send Verification Code →</button>
    </form>
  </div>
  <div class="auth-foot"><a href="{% url 'login' %}">← Back to Sign In</a></div>
</div>
{% endblock %}
